<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw 交易看板</title>
    <!-- Preload the logo so the splash's first paint doesn't wait on a
         network round-trip. Matters a lot on cold loads. -->
    <link rel="preload" as="image" href="/brand-mark.webp" />
    <style>
      /* Initial paint frame — the main app CSS from Tailwind hasn't
         arrived yet, so we set ink-dark background directly on <html>
         to avoid a white flash. */
      html { background: #08111f; color-scheme: dark; }
      body { margin: 0; }

      .app-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        /* Painterly backdrop: two radial glows over ink-dark. Cheaper
           than animating a blur filter — the blur here is static. */
        background:
          radial-gradient(60% 60% at 50% 42%, rgba(113, 246, 209, 0.18), transparent 70%),
          radial-gradient(55% 55% at 50% 58%, rgba(239, 68, 68, 0.14), transparent 72%),
          radial-gradient(80% 80% at 50% 100%, rgba(15, 27, 47, 0.8), transparent 80%),
          #08111f;
        /* A single static backdrop blur. We animate OPACITY on exit,
           not the blur amount — the latter would re-composite every
           frame. */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        pointer-events: none;
        opacity: 1;
        transition: opacity 680ms cubic-bezier(0.22, 0.68, 0.32, 1);
        will-change: opacity;
      }

      /* A faint noise veil so the dark-grey feels premium instead of flat. */
      .app-splash::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 24px 24px;
        pointer-events: none;
        mask-image: radial-gradient(70% 70% at 50% 50%, #000 0%, transparent 90%);
      }

      .app-splash__logo {
        width: 148px;
        height: 148px;
        border-radius: 30px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(145deg, rgba(248, 113, 113, 0.3), rgba(99, 12, 47, 0.35));
        box-shadow:
          0 0 80px rgba(239, 68, 68, 0.35),
          0 24px 60px rgba(2, 6, 23, 0.6);
        transition: transform 860ms cubic-bezier(0.65, 0.05, 0.36, 1), opacity 620ms ease-out;
        will-change: transform, opacity;
      }
      .app-splash__logo img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .app-splash__eyebrow {
        letter-spacing: 0.4em;
        text-transform: uppercase;
        font-size: 11px;
        color: rgba(113, 246, 209, 0.85);
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        transition: transform 860ms cubic-bezier(0.65, 0.05, 0.36, 1), opacity 520ms ease-out;
        will-change: transform, opacity;
      }

      .app-splash__title {
        font-size: 46px;
        font-weight: 600;
        letter-spacing: -0.02em;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        color: #f8fafc;
        text-align: center;
        line-height: 1.05;
        transition: transform 860ms cubic-bezier(0.65, 0.05, 0.36, 1), opacity 520ms ease-out;
        will-change: transform, opacity;
      }

      .app-splash__byline {
        font-size: 13px;
        color: rgba(148, 163, 184, 0.85);
        font-family: "Space Grotesk", "Avenir Next", sans-serif;
        letter-spacing: 0.04em;
        transition: transform 860ms cubic-bezier(0.65, 0.05, 0.36, 1), opacity 520ms ease-out;
        will-change: transform, opacity;
      }
      .app-splash__byline em {
        color: #71f6d1;
        font-style: normal;
      }

      @media (max-width: 640px) {
        .app-splash__logo { width: 108px; height: 108px; border-radius: 22px; }
        .app-splash__title { font-size: 32px; }
      }

      /* ───── Exit animation ───── */
      /* Logo, title, byline fly to (approximate) real-UI landing zones
         and STAY fully opaque — the backdrop is the only thing that
         fades. When the backdrop is gone the three elements sit on top
         of the real sidebar / header / description; visually identical,
         so the user perceives them as "the real UI has arrived". The
         whole splash DOM is then removed, which is invisible because
         the real elements are already painted underneath.
         Transform targets use vw/vh so they scale reasonably across
         viewports; pixel-perfection isn't required — the real UI
         underneath is the one that stays. */
      html[data-app-ready="true"] .app-splash {
        /* Hold the blurred backdrop for a moment while the three
           elements are in-flight, then fade it over the final 420ms. */
        opacity: 0;
        transition-delay: 440ms;
      }
      html[data-app-ready="true"] .app-splash__logo {
        /* Lands near the sidebar logo slot on desktop (~34,38 from
           top-left). Scale 148→36 = ~0.243. */
        transform: translate(-47.6vw, -45.8vh) scale(0.243);
      }
      html[data-app-ready="true"] .app-splash__title {
        /* Lands near the main h1 slot (~420,90). Scale 46→36. */
        transform: translate(-21vw, -40vh) scale(0.783);
      }
      html[data-app-ready="true"] .app-splash__byline {
        /* Lands just below the title (~420,125). Size matches. */
        transform: translate(-21vw, -36vh) scale(1);
      }
      /* Eyebrow isn't a "real" element in the final UI — fade it out. */
      html[data-app-ready="true"] .app-splash__eyebrow {
        transform: translate(0, -24vh) scale(0.8);
        opacity: 0;
      }

      /* Mobile: logo lands at the top-bar, not the sidebar. */
      @media (max-width: 1023px) {
        html[data-app-ready="true"] .app-splash__logo {
          transform: translate(-44vw, -48vh) scale(0.28);
        }
        html[data-app-ready="true"] .app-splash__title {
          transform: translate(-26vw, -44vh) scale(0.65);
        }
        html[data-app-ready="true"] .app-splash__byline {
          transform: translate(-26vw, -38vh) scale(0.9);
        }
      }

      /* Respect reduced-motion preferences: skip the fly, just fade. */
      @media (prefers-reduced-motion: reduce) {
        .app-splash,
        .app-splash__logo,
        .app-splash__eyebrow,
        .app-splash__title,
        .app-splash__byline {
          transition-duration: 200ms;
          transition-delay: 0 !important;
        }
        html[data-app-ready="true"] .app-splash__logo,
        html[data-app-ready="true"] .app-splash__eyebrow,
        html[data-app-ready="true"] .app-splash__title,
        html[data-app-ready="true"] .app-splash__byline {
          transform: none;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body class="bg-ink">
    <div id="app-splash" class="app-splash" aria-hidden="true">
      <div class="app-splash__logo">
        <img src="/brand-mark.webp" alt="" width="148" height="148" draggable="false" />
      </div>
      <div class="app-splash__eyebrow">OPENCLAW</div>
      <div class="app-splash__title">Openclaw Trader AI交易</div>
      <div class="app-splash__byline">基于 OpenClaw 的 4 Agent Crypto永续合约交易集群实验 · 作者 <em>MrPhotato</em></div>
    </div>
    <div id="root"></div>
    <script>
      // Splash lifecycle. Kept minimal + inline so the browser can run
      // it on first paint without waiting for the module bundle.
      (function () {
        var start = performance.now();
        // Floor — keeps the splash visible long enough to read even
        // when React mounts in <100ms. Ceiling — safety net in case
        // the backend is down, so the UI isn't blocked by a stuck
        // splash.
        var MIN_MS = 900;
        var MAX_MS = 5000;
        var released = false;
        function release() {
          if (released) return;
          released = true;
          var elapsed = performance.now() - start;
          var wait = Math.max(0, MIN_MS - elapsed);
          setTimeout(function () {
            document.documentElement.setAttribute("data-app-ready", "true");
            setTimeout(function () {
              var el = document.getElementById("app-splash");
              if (el && el.parentNode) el.parentNode.removeChild(el);
            }, 1000); // ≥ longest transition (860ms) + slack
          }, wait);
        }
        // Dev-only hold: `?splash-hold=1` pins the splash for inspection.
        var held = new URLSearchParams(location.search).get("splash-hold") === "1";
        window.releaseSplash = held ? function () {} : release;
        if (!held) setTimeout(release, MAX_MS);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
